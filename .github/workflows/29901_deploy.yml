name: 29901 Deploy Docker slike

# Ta workflow se sproži ob potisku na vejo main.
# Deploy job se izvede šele po tem, ko se uspešno zaključi workflow za testiranje.
on:
  workflow_run:
    workflows:
      - 29901 Testiranje kode
    types:
      - completed
    branches:
      - main

jobs:
  deploy-docker:
    # Docker image se zgradi in objavi samo, če se je testni workflow uspešno zaključil.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Uporabimo self-hosted runner, ki teče na Ubuntu virtualki.
    runs-on: self-hosted

    steps:
      # Prenesemo kodo iz GitHub repozitorija na runner.
      - name: Prenos kode iz repozitorija
        uses: actions/checkout@v4

      # Nastavimo Docker Buildx, ki omogoča gradnjo Docker slik.
      - name: Nastavitev Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Prijava v DockerHub.
      # Uporabniško ime in token sta shranjena v GitHub Secrets,
      # zato občutljivi podatki niso zapisani direktno v skripti.
      - name: Prijava v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Zgradimo Docker sliko in jo objavimo na DockerHub.
      # Slika dobi dve oznaki:
      # - latest
      # - oznako trenutnega commita
      - name: Gradnja in objava Docker slike
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/naloga3-ci-cd:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/naloga3-ci-cd:${{ github.sha }}
